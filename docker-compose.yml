version: "3.9"

services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-studybuddy}
      MYSQL_USER: ${MYSQL_USER:-studybuddy}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-studybuddy}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-studybuddy}:${MYSQL_PASSWORD:-studybuddy}@mysql:3306/${MYSQL_DATABASE:-studybuddy}
    depends_on:
      - mysql
    volumes:
      - backend_checkpoints:/app/checkpoints
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  backend_checkpoints:
